server {
    listen 3000;
    server_name localhost;

    # Maximum file upload size
    client_max_body_size 100M;

    # Gzip Compression
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/vnd.apple.mpegurl;
    gzip_vary on;

    # Serve static frontend files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend container
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Production streaming timeouts — segments may take time to transcode
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Disable buffering for streaming responses (SSE & HLS segments)
        proxy_buffering off;
        proxy_request_buffering off;
        chunked_transfer_encoding on;
        proxy_cache off;
    }

    # Dedicated location for HLS segment serving — optimised for minimal latency
    location ~ ^/api/v1/stream/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Aggressive timeouts for segment transcoding
        proxy_connect_timeout 5s;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;

        # Zero buffering — stream bytes directly to client
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;

        # Allow large segments
        proxy_max_temp_file_size 0;

        # CORS for HLS.js
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0" always;
    }
}
